name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Least-privilege default for all jobs. GITHUB_TOKEN is read-only unless a job
# overrides this block. Gitleaks runs with GITLEAKS_ENABLE_COMMENTS=false so it
# does not require pull-requests: write.
permissions:
  contents: read

jobs:
  lint:
    name: "Lint (markdown + frontmatter + stale-refs)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install markdownlint-cli2
        run: npm install --no-save --no-audit --no-fund markdownlint-cli2@0.13.0

      - name: Run markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#node_modules" "#.planning" "#.claude" "#test-fixture/baselines"

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          # .lycheeignore is auto-discovered at repo root. `--exclude 'file://'`
          # skips local-file link resolution (lychee resolves repo-root-relative
          # links as if relative to the source file's dir, which over-fires on
          # our docs that use `[x](connections/foo.md)` from repo root).
          # External HTTP/HTTPS link rot is still caught — that's the valuable check.
          args: >-
            --no-progress
            --accept 200,206,403,429
            --exclude 'file://'
            --exclude-path node_modules
            --exclude-path .planning
            --exclude-path .claude
            --exclude-path test-fixture/baselines
            '**/*.md'
          fail: true

      - name: Install dev dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate agent frontmatter
        run: npm run validate:frontmatter

      - name: Detect stale references
        run: node scripts/detect-stale-refs.cjs

  validate:
    name: "Validate (schemas + plugin + shellcheck)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dev dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Validate JSON schemas
        run: npm run validate:schemas

      - name: Plugin validate (schema-only fallback)
        run: |
          # D-09: run `claude plugin validate .` if the CLI is on the runner;
          # else the schema validation above is the authoritative check.
          if command -v claude >/dev/null 2>&1 && claude plugin --help 2>&1 | grep -q 'validate'; then
            echo "claude CLI detected — running claude plugin validate ."
            claude plugin validate . || exit 1
          else
            echo "claude plugin validate CLI not available on runner — schema validation (previous step) is the authoritative check per D-09."
          fi

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: error
          scandir: scripts

      - name: Detect hardcoded absolute paths
        run: |
          set -e
          # D-11: flag /Users/, /home/<user>/, and C:\ in shipped content dirs.
          # Exit nonzero on any match. DEPRECATIONS.md excluded (documents examples).
          MATCHES=$(grep -rnE '/Users/|/home/[a-z]+/|C:\\\\' \
            scripts/ reference/ agents/ skills/ \
            --include='*.sh' --include='*.cjs' --include='*.js' --include='*.md' \
            --exclude-dir='baselines' \
            2>/dev/null | grep -v 'DEPRECATIONS.md' || true)
          if [ -n "$MATCHES" ]; then
            echo "Hardcoded absolute paths detected:"
            echo "$MATCHES"
            echo "Use \$HOME or a relative path instead (Phase 1 cross-platform discipline)."
            exit 1
          fi
          echo "No hardcoded absolute paths found."

  test:
    name: "Test (Node ${{ matrix.node-version }} / ${{ matrix.os }})"
    needs: [lint, validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run tests
        run: npm test

  security:
    name: "Security (secrets + injection scan)"
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for gitleaks initial scan per D-12

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Injection scanner (CI mode)
        run: npm run scan:injection

  size-budget:
    name: "Size budget (blocking)"
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Agent size-budget gate
        run: |
          if ! npm run test:size-budget; then
            echo ""
            echo "ERROR: one or more agents exceed their size_budget tier."
            echo "To raise: set size_budget: XL in the agent frontmatter AND include rationale in the PR description."
            echo "See CONTRIBUTING.md for the override process."
            exit 1
          fi

  e2e-headless:
    name: "E2E headless (dry-run + conditional live)"
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: E2E dry-run (zero API cost; always runs)
        run: node --test --experimental-strip-types tests/e2e-headless.test.ts

      - name: E2E live (main-branch push + secret only)
        # Plan 21-11: live mode is gated on BOTH the branch refname
        # (refs/heads/main) AND the presence of the Anthropic secret.
        # PR builds from forks never see the secret, so this step is a
        # no-op there; PR coverage relies on the dry-run step above.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GDD_E2E_LIVE: '1'
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "# skip e2e-headless live: secret not available on this runner"
            exit 0
          fi
          node --test --experimental-strip-types tests/e2e-headless.test.ts
