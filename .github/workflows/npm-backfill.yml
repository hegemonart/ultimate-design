name: npm backfill publish

# Manually publish the current main branch to npm as @hegemonart/get-design-done
# under a specific version. Used when:
#   - A release shipped before the npm-publish step existed in release.yml
#     (e.g. v1.0.7 predates the npm-publish infrastructure in PR #11)
#   - Re-running a publish for a specific version that failed the first time
#
# This workflow publishes from HEAD of main, NOT from the tag's historic
# commit. That's intentional — the tag's tree predates the scoped package
# setup (`@hegemonart/...` rename, publishConfig, files allowlist,
# verify-version-sync.cjs). We publish the CURRENT package layout at the
# version number supplied, using the `version` input as a sanity gate that
# must match package.json.
#
# Usage (from GitHub UI):
#   Actions → "npm backfill publish" → Run workflow → enter version, e.g. 1.0.7
#
# Requires: NPM_TOKEN repo secret with publish rights on @hegemonart.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match package.json on main, e.g. 1.0.7 — no v prefix)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # needed for npm provenance

jobs:
  npm-backfill:
    name: "npm publish (backfill ${{ inputs.version }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        # Note: refs/heads/main by default — intentionally not the tag.

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify input matches package.json version
        run: |
          set -euo pipefail
          EXPECTED="${{ inputs.version }}"
          # Tolerate a leading 'v' if the user typed one.
          EXPECTED="${EXPECTED#v}"
          ACTUAL=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("package.json","utf8")).version)')
          echo "Input says: $EXPECTED"
          echo "package.json on main says: $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "ERROR: input version ${EXPECTED} does not match main's package.json ${ACTUAL}."
            echo "Either bump package.json on main first, or re-run this workflow with the correct version."
            exit 1
          fi

      - name: Verify version sync across manifests
        run: node scripts/verify-version-sync.cjs

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
